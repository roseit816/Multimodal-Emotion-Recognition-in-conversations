<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EmotiSense — Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d17;--bg2:#12142a;--bg3:#191c30;--bg4:#20243a;
  --bdr:#2b2f4a;--bdr2:#3a3f62;
  --tx:#dde1ff;--mu:#6872a8;--hi:#3e4468;
  --ac:#5865f2;--ac2:#7983f5;
  --gr:#22c55e;--rd:#ef4444;--am:#f59e0b;
  --r:10px;--rs:7px;
}
html,body{min-height:100%;background:var(--bg);color:var(--tx);
  font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.6}

.page{max-width:860px;margin:0 auto;padding:28px 20px 48px}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;gap:12px;flex-wrap:wrap}
.hdr h1{font-size:19px;font-weight:700;
  background:linear-gradient(120deg,#5865f2,#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:11px;color:var(--mu);margin-top:2px}
.hdr-btns{display:flex;gap:8px}
.btn{padding:7px 14px;border-radius:var(--rs);border:1px solid var(--bdr2);
  background:var(--bg3);color:var(--mu);cursor:pointer;font-size:12px;
  font-weight:500;text-decoration:none;display:inline-flex;align-items:center;
  gap:5px;transition:all .15s}
.btn:hover{border-color:var(--ac);color:var(--ac2)}
.btn.primary{background:var(--ac);border-color:var(--ac);color:#fff}
.btn.primary:hover{background:var(--ac2)}

/* summary row */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.scard{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);
  padding:14px 16px;text-align:center}
.sval{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px}
.slbl{font-size:11px;color:var(--mu)}

/* chart boxes */
.cbox{background:var(--bg2);border:1px solid var(--bdr);
  border-radius:var(--r);padding:20px;margin-bottom:16px}
.cbox h2{font-size:14px;font-weight:600;margin-bottom:3px}
.cbox .sub{font-size:11px;color:var(--mu);margin-bottom:16px}
.cbox canvas{width:100%!important;max-height:260px}

/* empty / loading */
.empty{text-align:center;padding:60px 20px}
.empty .icon{font-size:44px;margin-bottom:14px}
.empty h3{font-size:16px;color:var(--tx);margin-bottom:8px}
.empty p{font-size:13px;color:var(--mu);max-width:340px;margin:0 auto}
.empty a{color:var(--ac2);text-decoration:none}
.spin{width:28px;height:28px;border:3px solid var(--bdr2);
  border-top-color:var(--ac);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Arc / Novelty panel ───────────────────────────────────── */
#arc-btn-wrap{text-align:center;margin:4px 0 20px}
#arc-btn{padding:9px 28px;background:var(--ac);border:none;
  border-radius:var(--rs);color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;display:inline-flex;
  align-items:center;gap:7px}
#arc-btn:hover{background:var(--ac2);transform:translateY(-1px)}
#arc-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
#arc-panel{display:none;margin-bottom:20px}
#arc-panel.show{display:block}
.arc-badge{display:inline-flex;align-items:center;gap:8px;
  padding:10px 18px;border-radius:var(--rs);margin-bottom:14px}
.arc-type{font-size:17px;font-weight:700}
.arc-sub{font-size:11px;opacity:.7;margin-top:1px}
.arc-desc{background:var(--bg3);border-left:3px solid var(--ac);
  border-radius:0 var(--rs) var(--rs) 0;padding:10px 14px;
  font-size:13px;color:var(--tx);line-height:1.7;margin-bottom:16px}
.shifts-list{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.shift-item{display:flex;align-items:center;gap:10px;padding:8px 12px;
  background:var(--bg3);border-radius:var(--rs);font-size:12px}
.shift-num{font-weight:700;color:var(--mu);min-width:28px;font-size:11px}
.shift-conf{margin-left:auto;color:var(--mu);font-size:11px}
.no-shifts{color:var(--mu);font-size:12px;padding:10px 0;text-align:center}
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div>
      <h1>📊 Session Analytics</h1>
      <p>Accuracy graph and F1 scores — predictions from the start of the session</p>
    </div>
    <div class="hdr-btns">
      <button class="btn primary" onclick="load()">🔄 Refresh</button>
      <a class="btn" href="/" target="_parent">← Back</a>
    </div>
  </div>

  <div id="root">
    <div class="empty">
      <div class="spin"></div>
      <p>Loading…</p>
    </div>
  </div>

  <!-- ── Show Emotion Shifts button ── -->
  <div id="arc-btn-wrap" style="display:none">
    <button id="arc-btn" onclick="loadArc()">🔍 Show Emotion Shifts</button>
  </div>

  <!-- ── Arc panel (hidden until button pressed) ── -->
  <div id="arc-panel" class="cbox">
    <h2>🎭 Emotional Arc Analysis</h2>
    <div class="sub">How emotions evolved across the conversation — novelty feature</div>
    <div id="arc-content">
      <div class="spin" style="margin:20px auto"></div>
    </div>
  </div>

</div>
<script>
const IEMOCAP_L = ["joy/excited","sadness","anger","neutral","surprise","fear"];
const MELD_L    = ["neutral","surprise","fear","sadness","joy","disgust","anger"];
const EMOJI     = ["😄","😢","😠","😐","😲","😨","🤢"];
const COLORS    = ["#f59e0b","#3b82f6","#ef4444","#6b7280","#8b5cf6","#06b6d4","#a855f7"];

let chartConf = null;
let chartF1   = null;

window.addEventListener("DOMContentLoaded", load);

async function load() {
  const ds = new URLSearchParams(location.search).get("ds") || "iemocap";
  try {
    const d = await fetch(`/api/metrics?dataset=${ds}`).then(r => r.json());
    render(d, ds);
  } catch(e) {
    document.getElementById("root").innerHTML = `
      <div class="empty">
        <div class="icon">⚠️</div>
        <h3>Cannot reach server</h3>
        <p>Make sure EmotiSense is running then <a href="#" onclick="load()">refresh</a>.</p>
      </div>`;
  }
}

function render(d, ds) {
  const root = document.getElementById("root");

  if (!d.total) {
    root.innerHTML = `
      <div class="empty">
        <div class="icon">🎭</div>
        <h3>No predictions yet</h3>
        <p>Go to the <a href="/" target="_parent">chat page</a> and upload audio or video
        files from IEMOCAP / MELD to generate predictions.</p>
      </div>`;
    return;
  }

  const labels  = d.label_names || IEMOCAP_L;
  const preds   = d.predictions || [];
  const perCls  = d.per_class   || [];
  const avgConf = d.avg_confidence || 0;

  // top predicted emotion
  const counts   = d.emotion_counts || {};
  const topEntry = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  const topEmo   = topEntry ? topEntry[0] : "—";
  const topIdx   = labels.indexOf(topEmo);
  const topEmoji = topIdx >= 0 ? EMOJI[topIdx] : "🎭";

  // weighted F1 proxy: weighted average of per-class probabilities by count
  const totalCount = Object.values(counts).reduce((s,v)=>s+v, 0) || 1;
  let wf1 = 0;
  perCls.forEach(c => {
    const w = (counts[c.label] || 0) / totalCount;
    wf1 += w * c.avg_prob;
  });
  wf1 = wf1.toFixed(1);

  root.innerHTML = `
    <!-- Summary -->
    <div class="summary">
      <div class="scard">
        <div class="sval" style="color:#5865f2">${avgConf.toFixed(1)}%</div>
        <div class="slbl">Avg. Confidence</div>
      </div>
      <div class="scard">
        <div class="sval" style="color:#22c55e">${wf1}%</div>
        <div class="slbl">Weighted F1 (proxy)</div>
      </div>
      <div class="scard">
        <div class="sval">${topEmoji}</div>
        <div class="slbl">Top Predicted: ${topEmo}</div>
      </div>
    </div>

    <!-- Confidence graph -->
    <div class="cbox">
      <h2>📈 Confidence Over Time</h2>
      <div class="sub">Model prediction confidence for each utterance from start to end of session</div>
      <canvas id="conf-chart"></canvas>
    </div>

    <!-- F1 bar chart -->
    <div class="cbox">
      <h2>📊 Per-Class F1 Score</h2>
      <div class="sub">Average model probability per emotion class — used as F1 proxy
        (exact F1 requires dataset ground-truth labels)</div>
      <canvas id="f1-chart"></canvas>
    </div>
  `;

  // ── Confidence chart ──────────────────────────────────────────────────────
  if (chartConf) chartConf.destroy();
  const ctxConf = document.getElementById("conf-chart");
  const ptColors = preds.map(p => {
    const i = labels.indexOf(p.emotion);
    return i >= 0 ? COLORS[i] : "#6b7280";
  });
  chartConf = new Chart(ctxConf, {
    type: "line",
    data: {
      labels: preds.map(p => `#${p.idx}`),
      datasets: [{
        label: "Confidence (%)",
        data:  preds.map(p => p.confidence),
        borderColor:          "#5865f2",
        backgroundColor:      "rgba(88,101,242,.12)",
        borderWidth:          2,
        pointBackgroundColor: ptColors,
        pointBorderColor:     ptColors,
        pointRadius:          5,
        pointHoverRadius:     7,
        tension:              0.35,
        fill:                 true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#12142a", borderColor: "#2b2f4a", borderWidth: 1,
          titleColor: "#dde1ff", bodyColor: "#6872a8",
          callbacks: {
            label: ctx => ` Confidence: ${ctx.parsed.y}%`,
            afterLabel: ctx => {
              const p = preds[ctx.dataIndex];
              const ei = labels.indexOf(p.emotion);
              const em = ei >= 0 ? EMOJI[ei] : "🎭";
              return ` ${em} ${p.emotion}   ${p.input_type}   ${p.ts}`;
            }
          }
        }
      },
      scales: {
        y: {
          min: 0, max: 100,
          ticks: { callback: v => v + "%", color: "#6872a8" },
          grid:  { color: "rgba(255,255,255,.05)" }
        },
        x: {
          ticks: { color: "#6872a8" },
          grid:  { color: "rgba(255,255,255,.05)" }
        }
      }
    }
  });

  // ── F1 / per-class probability chart ─────────────────────────────────────
  if (chartF1) chartF1.destroy();
  const ctxF1 = document.getElementById("f1-chart");
  const f1Vals  = labels.map(l => { const c = perCls.find(p=>p.label===l); return c?c.avg_prob:0; });
  const f1Colors= labels.map((_,i) => COLORS[i] + "cc");
  chartF1 = new Chart(ctxF1, {
    type: "bar",
    data: {
      labels: labels.map((l,i) => EMOJI[i] + "  " + l),
      datasets: [{
        label: "Avg. Probability (%)",
        data:  f1Vals,
        backgroundColor: f1Colors,
        borderColor:     labels.map((_,i) => COLORS[i]),
        borderWidth:     1,
        borderRadius:    5,
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#12142a", borderColor: "#2b2f4a", borderWidth: 1,
          titleColor: "#dde1ff", bodyColor: "#6872a8",
          callbacks: {
            label: ctx => ` F1 proxy: ${ctx.parsed.x.toFixed(1)}%  (count: ${counts[labels[ctx.dataIndex]]||0})`
          }
        }
      },
      scales: {
        x: {
          min: 0, max: 100,
          ticks: { callback: v => v + "%", color: "#6872a8" },
          grid:  { color: "rgba(255,255,255,.05)" }
        },
        y: {
          ticks: { color: "#adb5ff", font: { size: 12 } },
          grid:  { display: false }
        }
      }
    }
  });
  // Show the arc button now that there is data
  const arcBtnWrap = document.getElementById("arc-btn-wrap");
  if (arcBtnWrap) arcBtnWrap.style.display = "block";
}

// ── Emotion Shifts (Arc Analysis) ────────────────────────────────────────────
const EMO_COL = {
  "joy/excited":"#f59e0b","joy":"#f59e0b","sadness":"#3b82f6",
  "anger":"#ef4444","neutral":"#9ca3af","surprise":"#8b5cf6",
  "fear":"#06b6d4","disgust":"#a855f7",
};

async function loadArc() {
  const btn   = document.getElementById("arc-btn");
  const panel = document.getElementById("arc-panel");

  // Toggle off
  if (panel.classList.contains("show")) {
    panel.classList.remove("show");
    btn.innerHTML = "🔍 Show Emotion Shifts";
    return;
  }

  btn.disabled  = true;
  btn.innerHTML = "Loading…";
  panel.classList.add("show");

  try {
    const ds = new URLSearchParams(location.search).get("ds") || "iemocap";
    const d  = await fetch("/api/arc_summary?dataset=" + ds).then(r => r.json());
    renderArc(d);
    btn.innerHTML = "✕ Hide Emotion Shifts";
  } catch(e) {
    document.getElementById("arc-content").innerHTML =
      '<p style="color:var(--rd);font-size:12px">Failed to load arc data.</p>';
    btn.innerHTML = "🔍 Show Emotion Shifts";
  } finally {
    btn.disabled = false;
  }
}

function renderArc(d) {
  const arc    = d.arc    || {};
  const shifts = d.shifts || [];
  const trend  = arc.intensity_trend || [];

  // ── Arc badge ─────────────────────────────────────────────────────────────
  const badge = '<div class="arc-badge" style="background:' + arc.arc_color + '22;border:1px solid ' + arc.arc_color + '55">'
    + '<span style="font-size:22px">' + arc.arc_emoji + '</span>'
    + '<div>'
    + '<div class="arc-type" style="color:' + arc.arc_color + '">' + arc.arc_type + '</div>'
    + '<div class="arc-sub" style="color:var(--mu)">Dominant: ' + arc.dominant_emotion
    + ' &nbsp;·&nbsp; Shift rate: ' + Math.round((arc.shift_rate || 0) * 100) + '%</div>'
    + '</div></div>';

  // ── Description ───────────────────────────────────────────────────────────
  const desc = '<div class="arc-desc">' + (arc.description || "—") + '</div>';

  // ── Intensity trend SVG ───────────────────────────────────────────────────
  let intensityHtml = "";
  if (trend.length >= 2) {
    const W=740, H=90, PL=36, PR=10, PT=8, PB=22;
    const cW=W-PL-PR, cH=H-PT-PB, n=trend.length;
    const px = i => PL + (n>1 ? i*cW/(n-1) : cW/2);
    const py = v => PT + cH - v*cH;

    const pts = trend.map((v,i) => px(i).toFixed(1)+","+py(v).toFixed(1)).join(" ");
    let area  = "M "+px(0)+","+py(trend[0]);
    for (let i=1;i<n;i++) area += " L "+px(i)+","+py(trend[i]);
    area += " L "+px(n-1)+","+(PT+cH)+" L "+px(0)+","+(PT+cH)+" Z";

    const shiftIdxSet = new Set(shifts.map(s => s.idx));
    const yTicks = [0, 0.5, 1.0];
    let grid = yTicks.map(v =>
      '<line x1="'+PL+'" y1="'+py(v)+'" x2="'+(W-PR)+'" y2="'+py(v)+'" stroke="#ffffff0d" stroke-width="1"/>'
      +'<text x="'+(PL-4)+'" y="'+(py(v)+4)+'" text-anchor="end" font-size="9" fill="#6872a8">'+v.toFixed(1)+'</text>'
    ).join("");
    let dots = trend.map((v,i) => {
      const col = shiftIdxSet.has(i+1) ? "#f59e0b" : "#ef4444";
      return '<circle cx="'+px(i)+'" cy="'+py(v)+'" r="4" fill="'+col+'" stroke="#12142a" stroke-width="1.5"/>';
    }).join("");
    let xlabels = trend.map((_,i) => {
      if (n<=8 || i%Math.ceil(n/8)===0)
        return '<text x="'+px(i)+'" y="'+(H-4)+'" text-anchor="middle" font-size="9" fill="#6872a8">#'+(i+1)+'</text>';
      return "";
    }).join("");

    intensityHtml = '<div style="margin-bottom:6px;font-size:12px;font-weight:600;color:var(--tx)">'
      + 'Emotional Intensity Trend'
      + '<span style="font-weight:400;color:var(--mu);font-size:11px;margin-left:6px">'
      + '— 1.0 = highest (anger/joy) · 0.1 = lowest (neutral)</span></div>'
      + '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;overflow:visible">'
      + grid
      + '<path d="'+area+'" fill="rgba(239,68,68,.08)"/>'
      + '<polyline points="'+pts+'" fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
      + dots + xlabels
      + '<line x1="'+PL+'" y1="'+(PT+cH)+'" x2="'+(W-PR)+'" y2="'+(PT+cH)+'" stroke="#2b2f4a" stroke-width="1"/>'
      + '</svg>'
      + '<p style="font-size:10px;color:var(--mu);margin-top:4px;margin-bottom:16px">🟡 Yellow = emotion shift point</p>';
  }

  // ── Shifts list ───────────────────────────────────────────────────────────
  let shiftsHtml = "";
  if (!shifts.length) {
    shiftsHtml = '<div class="no-shifts">No emotion shifts detected in this session.</div>';
  } else {
    const header = '<div style="font-size:12px;font-weight:600;color:var(--tx);margin-bottom:8px">'
      + 'All Emotion Shifts'
      + '<span style="font-weight:400;color:var(--mu);font-size:11px;margin-left:6px">— '
      + shifts.length + ' shift' + (shifts.length!==1?"s":"") + ' detected</span></div>';
    const items = shifts.map(s => {
      const fc = EMO_COL[s.from_emotion]||"#6b7280";
      const tc = EMO_COL[s.to_emotion]  ||"#6b7280";
      return '<div class="shift-item">'
        + '<span class="shift-num">#'+s.idx+'</span>'
        + '<span style="color:'+fc+';font-weight:600">'+s.from_emotion+'</span>'
        + '<span style="color:var(--mu);font-size:10px;margin:0 4px">→</span>'
        + '<span style="color:'+tc+';font-weight:600">'+s.to_emotion+'</span>'
        + '<span class="shift-conf">'+s.confidence+'% · '+s.ts+'</span>'
        + '</div>';
    }).join("");
    shiftsHtml = header + '<div class="shifts-list">'+items+'</div>';
  }

  document.getElementById("arc-content").innerHTML = badge + desc + intensityHtml + shiftsHtml;
}
</script>
</body>
</html>
